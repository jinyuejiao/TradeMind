<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>登录 — TradeMind 商贸智脑</title>
    <link rel="stylesheet" href="./CSS/auth.css?v=tm-auth-1">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-body auth-body--center">
    <main class="auth-main">
        <div class="auth-card">
            <header class="auth-card-header">
                <div class="auth-logo" aria-hidden="true">
                    <i class="ph-bold ph-brain"></i>
                </div>
                <h1 class="auth-title">TradeMind</h1>
                <p class="auth-subtitle">商贸智脑 · 外贸管理系统</p>
            </header>
            <div class="auth-card-body">
                <form id="login-form" onsubmit="tmLoginSubmit(event)">
                    <div class="auth-field">
                        <label class="auth-label" for="login-username">用户名<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-user"></i>
                            <input class="auth-input" type="text" id="login-username" name="username" autocomplete="username" required placeholder="请输入用户名" />
                        </div>
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="login-password">密码<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-lock-key"></i>
                            <input class="auth-input" type="password" id="login-password" name="password" autocomplete="current-password" required placeholder="请输入密码" />
                            <button type="button" class="auth-toggle-pwd" onclick="tmTogglePassword('login-password', this)" aria-label="显示密码">
                                <i class="ph ph-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="auth-row-between">
                        <label class="auth-checkbox">
                            <input type="checkbox" id="login-remember" name="remember" />
                            <span>记住我</span>
                        </label>
                        <a class="auth-link" href="#" onclick="alert('演示环境：请联系管理员重置密码'); return false;">忘记密码?</a>
                    </div>
                    <button type="submit" class="auth-btn-primary">登录</button>
                </form>
                <p class="auth-footer-links">
                    还没有账号？<a class="auth-link" href="./register.html">立即注册</a>
                </p>
                <div class="auth-about">
                    <a href="#" onclick="alert('TradeMind 商贸智脑'); return false;">关于我们</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="auth-page-footer">
        © 2026 杭州巨脑科技有限公司 | 浙ICP备2026010257号-1
    </footer>
    <script src="./JsImpl/auth-pages.js?v=tm-auth-1"></script>
</body>
</html>
