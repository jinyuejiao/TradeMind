<div class="space-y-6 fade-in">
    <div class="tm-ops-glass rounded-tm-3xl p-5 md:p-6">
        <h2 class="text-sm font-bold text-slate-800 flex items-center gap-2 mb-1"><i class="ph ph-database text-ops-600"></i> 业务配额普查</h2>
        <p class="text-[10px] text-slate-500 mb-4">实时/准实时聚合 · Feign：ProductClient / CrmClient / SupplierClient</p>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3" id="ops-quota-cards"></div>
    </div>

    <div class="tm-ops-glass rounded-tm-3xl overflow-hidden">
        <div class="px-5 py-4 border-b border-indigo-100/80 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 bg-white/50">
            <h2 class="text-sm font-bold text-slate-800 flex items-center gap-2"><i class="ph ph-sparkle text-ops-600"></i> AI Token 消耗</h2>
            <div class="flex rounded-2xl border border-slate-200 bg-slate-50 p-0.5" id="ops-ai-period-tabs">
                <button type="button" data-period="day" class="ops-period px-4 py-1.5 rounded-xl text-[11px] font-bold bg-white text-ops-700 shadow-sm">日</button>
                <button type="button" data-period="week" class="ops-period px-4 py-1.5 rounded-xl text-[11px] font-bold text-slate-500">周</button>
                <button type="button" data-period="month" class="ops-period px-4 py-1.5 rounded-xl text-[11px] font-bold text-slate-500">月</button>
            </div>
        </div>
        <p class="px-5 py-2 text-[10px] text-slate-400 border-b border-indigo-50">POST /api/ops/ai-usage/query · 记录字段：tenantId, tokens, module(EXTRACT|CHAT), ts</p>
        <div class="overflow-x-auto max-h-[420px] overflow-y-auto list-scrollbar-ops">
            <table class="w-full text-left text-xs">
                <thead class="sticky top-0 bg-ops-50/95 text-[10px] uppercase font-bold text-ops-800 z-10">
                    <tr>
                        <th class="px-4 py-3">排名</th>
                        <th class="px-4 py-3">租户</th>
                        <th class="px-4 py-3">Tokens</th>
                        <th class="px-4 py-3">提取 / 对话</th>
                        <th class="px-4 py-3 text-right">钻取</th>
                    </tr>
                </thead>
                <tbody id="ops-ai-rank-body" class="divide-y divide-indigo-50 bg-white/50"></tbody>
            </table>
        </div>
    </div>

    <div class="tm-ops-glass rounded-tm-3xl p-5">
        <h3 class="text-xs font-bold text-slate-700 mb-3">租户明细（示例：点击上表「明细」后在此筛选）</h3>
        <div id="ops-ai-detail" class="text-xs text-slate-500 space-y-2 font-mono"></div>
    </div>
</div>
