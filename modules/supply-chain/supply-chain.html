<!-- 供应商管理模块 -->
<div class="w-full p-4 md:p-8 space-y-6 fade-in">

    <!-- 顶部视图切换药丸 -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div class="flex bg-white p-1 rounded-xl border border-slate-200 w-fit">
            <button onclick="switchSupplierView('list')" id="btn-sup-list" class="view-toggle-btn active px-5 py-1.5 rounded-lg text-xs font-bold">进货单据明细</button>
            <button onclick="switchSupplierView('supplier')" id="btn-sup-supplier" class="view-toggle-btn px-5 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-600">供应商编辑</button>
        </div>

        <!-- 仅在列表模式下显示的统计卡 -->
        <div id="sup-stat-chips" class="hidden flex gap-3 overflow-x-auto no-scrollbar">
            <div class="px-3 py-1.5 bg-white rounded-lg border border-slate-200 text-[10px] font-bold"><span class="text-slate-400 uppercase">本月进货:</span> <span id="sup-stat-month-total" class="text-slate-800 ml-1">¥0.00</span></div>
            <div class="px-3 py-1.5 bg-white rounded-lg border border-slate-200 text-[10px] font-bold"><span class="text-slate-400 uppercase">待收货:</span> <span id="sup-stat-pending-count" class="text-orange-500 ml-1">0 笔</span></div>
        </div>
        <button type="button" id="btn-new-purchase-order" onclick="window.openNewPurchaseOrderForm()" class="shrink-0 bg-brand-600 hover:bg-brand-700 text-white px-4 py-2.5 rounded-xl text-xs font-bold flex items-center gap-2 shadow-lg shadow-brand-500/20 transition-colors self-end md:self-auto">
            <i class="ph ph-plus"></i> 新增进货单
        </button>
    </div>

    <!-- 场景 B: 进货单据列表 (默认展示) -->
    <div id="sup-list-view" class="fade-in space-y-4">
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto no-scrollbar">
                <table class="supplier-mgmt-po-table w-full text-left border-collapse text-xs">
                    <thead class="bg-slate-50/50 text-slate-400 font-bold border-b border-slate-100 md:uppercase md:tracking-widest">
                        <tr>
                            <th class="px-3 py-3 md:px-6 md:py-4 tm-po-date whitespace-nowrap">进货日期</th>
                            <th class="px-3 py-3 md:px-6 md:py-4 tm-po-supplier whitespace-nowrap overflow-hidden text-ellipsis">供应商名称</th>
                            <th class="px-3 py-3 md:px-6 md:py-4 text-right col-hide-mobile">进货总额</th>
                            <th class="px-3 py-3 md:px-6 md:py-4 text-center tm-po-status whitespace-nowrap">状态</th>
                            <th class="px-3 py-3 md:px-6 md:py-4 text-right tm-po-action whitespace-nowrap">操作</th>
                        </tr>
                    </thead>
                    <tbody id="purchase-orders-tbody" class="divide-y divide-slate-50 text-slate-700">
                    </tbody>
                </table>
            </div>
            <div id="purchase-orders-pagination" class="border-t border-slate-100 bg-slate-50/70 px-3 py-2.5"></div>
        </div>
    </div>

    <!-- 场景 C: 供应商编辑 -->
    <div id="sup-supplier-view" class="hidden fade-in space-y-4">
        <div class="flex justify-between items-center">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">供应商管理</h3>
            <button onclick="openSupplierEditModal()" class="bg-brand-600 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                <i class="ph ph-plus"></i> 新增供应商
            </button>
        </div>
        
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto no-scrollbar">
                <table class="supplier-mgmt-edit-table w-full text-left border-collapse text-xs">
                    <thead class="bg-slate-50/50 text-slate-400 font-bold border-b border-slate-100 md:uppercase md:tracking-widest">
                        <tr>
                            <th class="px-3 py-3 md:px-6 md:py-4 tm-sup-name whitespace-nowrap overflow-hidden text-ellipsis">供应商名称</th>
                            <th class="px-3 py-3 md:px-6 md:py-4 tm-sup-contact whitespace-nowrap">联系人</th>
                            <th class="px-3 py-3 md:px-6 md:py-4 tm-sup-phone whitespace-nowrap overflow-hidden text-ellipsis">电话</th>
                            <th class="px-3 py-3 md:px-6 md:py-4 text-right tm-sup-action whitespace-nowrap">操作</th>
                        </tr>
                    </thead>
                    <tbody id="supplier-directory-tbody" class="divide-y divide-slate-50 text-slate-700">
                    </tbody>
                </table>
            </div>
            <div id="supplier-directory-pagination" class="border-t border-slate-100 bg-slate-50/70 px-3 py-2.5"></div>
        </div>
    </div>
</div>

<!-- 供应商编辑弹窗 -->
<div id="supplier-edit-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeSupplierEditModal()"></div>
    <div class="relative bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl fade-in text-left">
        <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2"><i class="ph ph-user-circle text-brand-500"></i> 供应商编辑</h3>
        <div class="space-y-6">
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">供应商名称</label>
                <input type="text" id="supplier-name" class="form-input w-full" placeholder="请输入供应商名称">
            </div>
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">联系人</label>
                <input type="text" id="supplier-contact" class="form-input w-full" placeholder="请输入联系人姓名">
            </div>
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">电话</label>
                <input type="tel" id="supplier-phone" class="form-input w-full" placeholder="请输入联系电话">
            </div>
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">评分</label>
                <select id="supplier-rating" class="form-input w-full">
                    <option value="A+">A+</option>
                    <option value="A">A</option>
                    <option value="B+">B+</option>
                    <option value="B">B</option>
                    <option value="C+">C+</option>
                    <option value="C">C</option>
                    <option value="C-">C-</option>
                </select>
            </div>
        </div>
        <div class="flex gap-4 mt-8">
            <button onclick="closeSupplierEditModal()" class="flex-1 py-3 rounded-xl border border-slate-200 text-xs font-bold text-slate-400 hover:bg-slate-50 transition-colors">取消</button>
            <button onclick="saveSupplierEdit()" class="flex-1 py-3 rounded-xl bg-brand-600 text-white text-xs font-bold shadow-lg hover:bg-brand-700 transition-colors">保存</button>
        </div>
    </div>
</div>
