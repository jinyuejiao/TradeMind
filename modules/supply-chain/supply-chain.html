<!-- 供应商管理模块 -->
<div class="w-full p-4 md:p-8 space-y-6 fade-in">

    <!-- 顶部视图切换药丸 -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div class="flex bg-white p-1 rounded-xl border border-slate-200 w-fit">
            <button onclick="switchSupplierView('list')" id="btn-sup-list" class="view-toggle-btn active px-5 py-1.5 rounded-lg text-xs font-bold">进货单据明细</button>
            <button onclick="switchSupplierView('supplier')" id="btn-sup-supplier" class="view-toggle-btn px-5 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-600">供应商编辑</button>
        </div>

        <!-- 仅在列表模式下显示的统计卡 -->
        <div id="sup-stat-chips" class="hidden flex gap-3 overflow-x-auto no-scrollbar">
            <div class="px-3 py-1.5 bg-white rounded-lg border border-slate-200 text-[10px] font-bold"><span class="text-slate-400 uppercase">本月进货:</span> <span class="text-slate-800 ml-1">$128,400</span></div>
            <div class="px-3 py-1.5 bg-white rounded-lg border border-slate-200 text-[10px] font-bold"><span class="text-slate-400 uppercase">待收货:</span> <span class="text-orange-500 ml-1">3 笔</span></div>
        </div>
    </div>

    <!-- 场景 B: 进货单据列表 (默认展示) -->
    <div id="sup-list-view" class="fade-in space-y-4">
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left border-collapse text-xs">
                    <thead class="bg-slate-50/50 text-slate-400 font-bold uppercase tracking-widest border-b border-slate-100">
                        <tr>
                            <th class="px-6 py-4">进货日期</th>
                            <th class="px-6 py-4">单据编号 / 来源</th>
                            <th class="px-6 py-4">供应商名称</th>
                            <th class="px-6 py-4 text-right col-hide-mobile">进货总额</th>
                            <th class="px-6 py-4 text-center">状态</th>
                            <th class="px-6 py-4 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="purchase-orders-tbody" class="divide-y divide-slate-50 text-slate-700">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 场景 C: 供应商编辑 -->
    <div id="sup-supplier-view" class="hidden fade-in space-y-4">
        <div class="flex justify-between items-center">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">供应商管理</h3>
            <button onclick="openSupplierEditModal()" class="bg-brand-600 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                <i class="ph ph-plus"></i> 新增供应商
            </button>
        </div>
        
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left border-collapse text-xs">
                    <thead class="bg-slate-50/50 text-slate-400 font-bold uppercase tracking-widest border-b border-slate-100">
                        <tr>
                            <th class="px-6 py-4">供应商名称</th>
                            <th class="px-6 py-4">联系人</th>
                            <th class="px-6 py-4">电话</th>
                            <th class="px-6 py-4">评分</th>
                            <th class="px-6 py-4 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50 text-slate-700">
                        <tr class="hover:bg-slate-50/80 transition-all">
                            <td class="px-6 py-4 font-bold text-slate-800">深圳照明科技</td>
                            <td class="px-6 py-4">张三</td>
                            <td class="px-6 py-4 font-mono">13800138000</td>
                            <td class="px-6 py-4"><span class="px-2 py-0.5 bg-green-50 text-green-600 rounded-full font-bold text-[10px]">A+</span></td>
                            <td class="px-6 py-4 text-right flex justify-end gap-2">
                                <button onclick="openSupplierEditModal('深圳照明科技', '张三', '13800138000', 'A+')" class="p-1.5 hover:bg-slate-100 rounded-full transition-colors">
                                    <i class="ph ph-pencil text-slate-400"></i>
                                </button>
                                <button onclick="confirmDeleteSupplier('深圳照明科技')" class="p-1.5 hover:bg-slate-100 rounded-full transition-colors">
                                    <i class="ph ph-trash text-slate-400 hover:text-risk-high"></i>
                                </button>
                            </td>
                        </tr>
                        <tr class="hover:bg-slate-50/80 transition-all">
                            <td class="px-6 py-4 font-bold text-slate-800">东莞包装制品</td>
                            <td class="px-6 py-4">李四</td>
                            <td class="px-6 py-4 font-mono">13900139000</td>
                            <td class="px-6 py-4"><span class="px-2 py-0.5 bg-red-50 text-red-600 rounded-full font-bold text-[10px]">C-</span></td>
                            <td class="px-6 py-4 text-right flex justify-end gap-2">
                                <button onclick="openSupplierEditModal('东莞包装制品', '李四', '13900139000', 'C-')" class="p-1.5 hover:bg-slate-100 rounded-full transition-colors">
                                    <i class="ph ph-pencil text-slate-400"></i>
                                </button>
                                <button onclick="confirmDeleteSupplier('东莞包装制品')" class="p-1.5 hover:bg-slate-100 rounded-full transition-colors">
                                    <i class="ph ph-trash text-slate-400 hover:text-risk-high"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 供应商编辑弹窗 -->
<div id="supplier-edit-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeSupplierEditModal()"></div>
    <div class="relative bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl fade-in text-left">
        <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2"><i class="ph ph-user-circle text-brand-500"></i> 供应商编辑</h3>
        <div class="space-y-6">
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">供应商名称</label>
                <input type="text" id="supplier-name" class="form-input w-full" placeholder="请输入供应商名称">
            </div>
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">联系人</label>
                <input type="text" id="supplier-contact" class="form-input w-full" placeholder="请输入联系人姓名">
            </div>
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">电话</label>
                <input type="tel" id="supplier-phone" class="form-input w-full" placeholder="请输入联系电话">
            </div>
            <div>
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">评分</label>
                <select id="supplier-rating" class="form-input w-full">
                    <option value="A+">A+</option>
                    <option value="A">A</option>
                    <option value="B+">B+</option>
                    <option value="B">B</option>
                    <option value="C+">C+</option>
                    <option value="C">C</option>
                    <option value="C-">C-</option>
                </select>
            </div>
        </div>
        <div class="flex gap-4 mt-8">
            <button onclick="closeSupplierEditModal()" class="flex-1 py-3 rounded-xl border border-slate-200 text-xs font-bold text-slate-400 hover:bg-slate-50 transition-colors">取消</button>
            <button onclick="saveSupplierEdit()" class="flex-1 py-3 rounded-xl bg-brand-600 text-white text-xs font-bold shadow-lg hover:bg-brand-700 transition-colors">保存</button>
        </div>
    </div>
</div>
