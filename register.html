<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>注册 — TradeMind 商贸智脑</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./CSS/auth.css?v=tm-auth-7">
    <link rel="stylesheet" href="./CSS/phosphor-icons.css?v=tm-phosphor-unpkg-1">
</head>
<body class="auth-body auth-body--center auth-page-register">
    <main class="auth-main auth-main--register">
        <div class="auth-card auth-register-card">
            <header class="auth-card-header">
                <div class="auth-logo" aria-hidden="true">
                    <i class="ph-bold ph-brain"></i>
                </div>
                <h1 class="auth-title">TradeMind</h1>
                <p class="auth-subtitle auth-subtitle--stacked">
                    <span class="auth-subtitle-brand">商贸智脑</span>
                    <span class="auth-subtitle-company">杭州巨猿科技有限公司</span>
                </p>
            </header>
            <div class="auth-card-body auth-register-body">
                <form id="register-form" class="auth-register-form" onsubmit="tmRegisterSubmit(event)" novalidate>
                    <div class="auth-field">
                        <label class="auth-label" for="reg-company">商户名称<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-storefront"></i>
                            <input class="auth-input" type="text" id="reg-company" name="companyName" required maxlength="80" placeholder="请输入企业或店铺名称" autocomplete="organization" />
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label" for="reg-username">登录名<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-user"></i>
                            <input class="auth-input" type="text" id="reg-username" name="username" autocomplete="username" required maxlength="64" placeholder="用于登录" />
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label" for="reg-password">登录密码<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-lock-key"></i>
                            <input class="auth-input" type="password" id="reg-password" name="password" autocomplete="new-password" required minlength="6" maxlength="64" placeholder="至少 6 位" />
                            <button type="button" class="auth-toggle-pwd" onclick="tmTogglePassword('reg-password', this)" aria-label="显示密码">
                                <i class="ph ph-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label" for="reg-password2">确认密码<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-lock-key"></i>
                            <input class="auth-input" type="password" id="reg-password2" name="passwordConfirm" autocomplete="new-password" required minlength="6" maxlength="64" placeholder="请再次输入密码" />
                            <button type="button" class="auth-toggle-pwd" onclick="tmTogglePassword('reg-password2', this)" aria-label="显示密码">
                                <i class="ph ph-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="auth-field-divider" aria-hidden="true"></div>

                    <div class="auth-field">
                        <label class="auth-label" for="reg-phone">手机号<span class="auth-required">*</span></label>
                        <div class="auth-input-row auth-input-row--phone">
                            <div class="auth-input-wrap auth-input-wrap--grow">
                                <i class="ph ph-phone"></i>
                                <input class="auth-input" type="tel" id="reg-phone" name="phone" autocomplete="tel" required inputmode="numeric" maxlength="11" pattern="1[3-9][0-9]{9}" placeholder="请输入手机号" />
                            </div>
                            <button type="button" class="auth-btn-sms" onclick="tmSendSmsCode(this)">发送验证码</button>
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label" for="reg-sms">验证码<span class="auth-required">*</span></label>
                        <div class="auth-input-wrap">
                            <i class="ph ph-chat-circle-text"></i>
                            <input class="auth-input" type="text" id="reg-sms" name="smsCode" required inputmode="numeric" maxlength="8" autocomplete="one-time-code" placeholder="请输入短信验证码" />
                        </div>
                    </div>

                    <details class="auth-optional-block">
                        <summary class="auth-optional-summary">
                            <span>选填：邮箱、社会信用码、推荐码</span>
                        </summary>
                        <div class="auth-optional-inner">
                            <div class="auth-field auth-field--last">
                                <label class="auth-label" for="reg-email">邮箱</label>
                                <div class="auth-input-wrap">
                                    <i class="ph ph-envelope-simple"></i>
                                    <input class="auth-input" type="email" id="reg-email" name="email" autocomplete="email" placeholder="选填" />
                                </div>
                            </div>
                            <div class="auth-field auth-field--last">
                                <label class="auth-label" for="reg-credit">社会信用代码</label>
                                <div class="auth-input-wrap">
                                    <i class="ph ph-identification-card"></i>
                                    <input class="auth-input" type="text" id="reg-credit" name="creditCode" maxlength="32" placeholder="选填" />
                                </div>
                            </div>
                            <div class="auth-field auth-field--last">
                                <label class="auth-label" for="reg-invite">推荐码</label>
                                <div class="auth-input-wrap">
                                    <i class="ph ph-gift"></i>
                                    <input class="auth-input" type="text" id="reg-invite" name="inviteCode" maxlength="32" placeholder="选填" />
                                </div>
                            </div>
                        </div>
                    </details>

                    <button type="submit" class="auth-btn-primary">完成注册</button>
                </form>

                <p class="auth-footer-links">
                    已有账号？<a class="auth-link" href="./login.html">立即登录</a>
                    <span class="auth-footer-dot">·</span>
                    <a class="auth-link" href="./gateway.html">选择商户类型</a>
                </p>
            </div>
        </div>
    </main>
    <footer class="auth-page-footer">
        © 2026 杭州巨脑科技有限公司 | 浙ICP备2026010257号-1
    </footer>
    <script src="./JsImpl/auth-pages.js?v=tm-auth-6"></script>
</body>
</html>
